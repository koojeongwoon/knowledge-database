<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LLM-Wiki Inbox</title><link rel="stylesheet" href="/settings/assets/settings.css"><link rel="stylesheet" href="/settings/assets/dashboard.css"><link rel="stylesheet" href="/settings/assets/inbox.css"></head><body><main class="inbox-shell"><nav class="top-nav"><a href="/dashboard">대시보드</a><a class="active" href="/inbox">Inbox</a><a href="/documents">문서</a><a href="/settings">연결 설정</a><a href="/search-feedback">검색 평가</a></nav><header class="inbox-header"><div><p class="eyebrow">LEARNING SOURCES</p><h1>Inbox</h1><p class="intro">아직 지식화하지 않은 파일과 링크를 내 저장소에 모아둡니다.</p></div><button id="logout-button" class="secondary" type="button">로그아웃</button></header><div id="message" class="message" role="status"></div><section class="capture-grid"><form id="file-form" class="card"><div class="section-heading"><div><span>01</span><h2>파일 올리기</h2></div></div><label for="inbox-file">파일</label><input id="inbox-file" name="file" type="file" required><label for="file-note">메모</label><textarea id="file-note" name="note" maxlength="2000" placeholder="학습할 때 기억할 내용"></textarea><p class="hint">최대 25MB. 원문은 Inbox에만 보관되며 자동으로 영구 지식이 되지 않습니다.</p><button class="primary" type="submit">파일 추가</button></form><form id="link-form" class="card"><div class="section-heading"><div><span>02</span><h2>링크 보관</h2></div></div><label for="link-url">URL</label><input id="link-url" type="url" maxlength="2048" placeholder="https://…" required><label for="link-title">제목</label><input id="link-title" type="text" maxlength="300" placeholder="비워두면 URL을 사용합니다"><label for="link-note">메모</label><textarea id="link-note" maxlength="2000" placeholder="왜 보관하는지 적어두세요"></textarea><p class="hint">링크는 우선 저장만 하며 서버가 자동 방문하지 않습니다.</p><button class="primary" type="submit">링크 추가</button></form></section><section class="card inbox-list-card"><div class="section-heading"><div><span>03</span><h2>내 Inbox</h2></div><button id="refresh-inbox" class="secondary" type="button">새로고침</button></div><div id="inbox-count" class="hint"></div><div id="inbox-list" class="inbox-list"></div></section></main><script src="/settings/assets/inbox.js" defer></script></body></html>
