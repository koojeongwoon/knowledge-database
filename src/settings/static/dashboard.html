<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LLM-Wiki 대시보드</title><link rel="stylesheet" href="/settings/assets/settings.css"><link rel="stylesheet" href="/settings/assets/dashboard.css"></head>
<body><main class="shell dashboard-shell">
<nav class="top-nav"><a class="active" href="/dashboard">대시보드</a><a href="/learning">학습</a><a href="/inbox">Inbox</a><a href="/documents">문서</a><a href="/settings">연결 설정</a></nav>
<header class="dashboard-header"><div><p class="eyebrow">LLM-WIKI</p><h1>대시보드</h1><p class="intro">MCP 연결에 사용할 API 키를 직접 발급하고 관리합니다.</p></div><button id="logout-button" class="secondary" type="button">로그아웃</button></header>
<section class="summary-grid" aria-label="서비스 요약"><article class="summary-card"><span>활성 API 키</span><strong id="key-count">—</strong></article><article class="summary-card"><span>MCP 엔드포인트</span><strong class="endpoint">https://mcp.lynply.com/mcp</strong></article></section>
<section class="card"><div class="section-heading"><div><span>01</span><h2>API 키</h2></div><button id="open-create" class="primary compact" type="button">새 키 발급</button></div><p class="hint">키 원문은 발급 직후 한 번만 표시됩니다. 안전한 곳에 복사해 두세요.</p><div id="key-message" class="message" role="status" aria-live="polite"></div><div id="key-list" class="key-list"></div></section>
</main>
<dialog id="create-dialog"><form id="create-form" method="dialog" class="dialog-card"><div class="section-heading"><div><span>NEW</span><h2>API 키 발급</h2></div><button id="close-create" class="icon-button" type="button" aria-label="닫기">×</button></div><label for="key-name">키 이름</label><input id="key-name" maxlength="100" placeholder="예: MacBook Codex" required><label for="validity-days">유효 기간</label><select id="validity-days"><option value="30">30일</option><option value="90">90일</option><option value="365" selected>1년</option><option value="1095">3년</option></select><div id="create-message" class="message" role="status"></div><button id="create-button" class="primary" type="submit">발급하기</button></form></dialog>
<dialog id="secret-dialog"><div class="dialog-card"><div class="section-heading"><div><span>READY</span><h2>키가 발급되었습니다</h2></div></div><p class="hint warning">이 창을 닫으면 키 원문을 다시 확인할 수 없습니다.</p><div class="secret-box"><code id="plain-key"></code><button id="copy-key" class="secondary" type="button">복사</button></div><div id="copy-message" class="message" role="status"></div><button id="close-secret" class="primary" type="button">복사 완료</button></div></dialog>
<script src="/settings/assets/dashboard.js" defer></script></body></html>
