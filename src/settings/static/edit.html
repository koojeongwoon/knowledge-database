<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LLM-Wiki 연결 정보 등록·수정</title><link rel="stylesheet" href="/settings/assets/settings.css"><link rel="stylesheet" href="/settings/assets/dashboard.css"></head><body><main class="shell"><nav class="top-nav"><a href="/dashboard">대시보드</a><a class="active" href="/settings">연결 설정</a></nav><header><p class="eyebrow">LLM-WIKI</p><h1>등록·수정</h1><p class="intro">새 Secret을 입력한 항목만 교체합니다. 기존 Secret을 유지하려면 해당 입력란을 비워두세요.</p></header><form id="settings-form" class="card"><div class="section-heading"><div><span>01</span><h2>AI 임베딩</h2></div><span id="openai-state" class="badge neutral">미설정</span></div><label for="openai-key">OpenAI API Key</label><input id="openai-key" type="password" autocomplete="new-password" placeholder="기존 값을 유지하려면 비워두세요"><div class="divider"></div><div class="section-heading"><div><span>02</span><h2>지식 저장소</h2></div><span id="storage-state" class="badge neutral">미설정</span></div><label for="storage-type">저장소 유형</label><select id="storage-type"><option value="s3">S3 호환 저장소</option><option value="r2">Cloudflare R2</option></select><div id="remote-fields"><label for="endpoint-url">Endpoint URL</label><input id="endpoint-url" type="url" placeholder="https://&lt;account-id&gt;.r2.cloudflarestorage.com"><label for="bucket-name">Bucket Name</label><input id="bucket-name" type="text" placeholder="my-wiki"><div class="grid-two"><div><label for="access-key">Access Key ID</label><input id="access-key" type="password" autocomplete="new-password" placeholder="기존 값 유지 시 비움"></div><div><label for="secret-key">Secret Access Key</label><input id="secret-key" type="password" autocomplete="new-password" placeholder="기존 값 유지 시 비움"></div></div></div><div id="message" class="message" role="status" aria-live="polite"></div><div class="action-row"><a class="button-link secondary" href="/settings">취소</a><button id="save-button" class="primary compact" type="submit">저장</button></div></form></main><script src="/settings/assets/edit.js" defer></script></body></html>
