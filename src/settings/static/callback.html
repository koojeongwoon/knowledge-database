<!doctype html>
<html lang="ko">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>로그인 처리 중</title></head>
<body>
  <main style="font-family:system-ui,sans-serif;max-width:520px;margin:18vh auto;padding:24px;text-align:center">
    <h1>로그인 연결 중</h1><p id="status">안전한 세션을 만드는 중입니다…</p>
  </main>
  <script>
    (async () => {
      const status = document.getElementById('status');
      const params = new URLSearchParams(location.hash.slice(1));
      const token = params.get('access_token');
      history.replaceState(null, '', '/callback');
      if (!token) { status.textContent = '로그인 토큰이 없습니다. 다시 로그인해 주세요.'; return; }
      try {
        const response = await fetch('/api/session', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({access_token: token})
        });
        if (!response.ok) throw new Error('세션 생성 실패');
        location.replace('/settings');
      } catch (_) { status.textContent = '로그인 세션을 만들지 못했습니다. 다시 시도해 주세요.'; }
    })();
  </script>
</body>
</html>
