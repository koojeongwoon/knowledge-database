<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LLM-Wiki 설정</title>
  <link rel="stylesheet" href="/settings/assets/settings.css">
</head>
<body>
  <main class="shell">
    <header>
      <p class="eyebrow">LLM-WIKI</p>
      <h1>연결 설정</h1>
      <p class="intro">로그인된 계정에 OpenAI와 R2 연결 정보를 안전하게 저장합니다. 이후 MCP에는 발급된 인증 API Key만 필요합니다.</p>
    </header>
    <section class="card">
      <div class="section-heading"><div><span>01</span><h2>사용자 인증</h2></div><span id="auth-state" class="badge good">로그인됨</span></div>
      <p class="hint">인증 포털의 지식베이스 계정으로 연결되어 있습니다.</p>
      <button id="logout-button" class="secondary" type="button">로그아웃</button>
    </section>
    <form id="settings-form" class="card">
      <div class="section-heading"><div><span>02</span><h2>AI 임베딩</h2></div><span id="openai-state" class="badge neutral">미설정</span></div>
      <label for="openai-key">OpenAI API Key</label><input id="openai-key" type="password" autocomplete="new-password" placeholder="기존 값을 유지하려면 비워두세요">
      <div class="divider"></div>
      <div class="section-heading"><div><span>03</span><h2>지식 저장소</h2></div><span id="storage-state" class="badge neutral">미설정</span></div>
      <label for="storage-type">저장소 유형</label>
      <select id="storage-type"><option value="s3">S3 호환 저장소</option><option value="r2">Cloudflare R2</option></select>
      <div id="remote-fields">
        <label for="endpoint-url">Endpoint URL</label><input id="endpoint-url" type="url" placeholder="https://&lt;account-id&gt;.r2.cloudflarestorage.com">
        <label for="bucket-name">Bucket Name</label><input id="bucket-name" type="text" placeholder="my-wiki">
        <div class="grid-two"><div><label for="access-key">Access Key ID</label><input id="access-key" type="password" autocomplete="new-password" placeholder="기존 값 유지 시 비움"></div><div><label for="secret-key">Secret Access Key</label><input id="secret-key" type="password" autocomplete="new-password" placeholder="기존 값 유지 시 비움"></div></div>
      </div>
      <div id="message" class="message" role="status" aria-live="polite"></div>
      <button id="save-button" class="primary" type="submit">설정 저장</button>
    </form>
  </main>
  <script src="/settings/assets/settings.js" defer></script>
</body>
</html>
