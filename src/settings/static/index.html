<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LLM-Wiki 설정</title>
  <link rel="stylesheet" href="/settings/assets/settings.css">
  <link rel="stylesheet" href="/settings/assets/dashboard.css">
  <link rel="stylesheet" href="/settings/assets/settings-view.css">
</head>
<body>
  <main class="shell">
    <nav class="top-nav"><a href="/dashboard">대시보드</a><a class="active" href="/settings">연결 설정</a><a href="/search-feedback">검색 평가</a></nav>
    <header>
      <p class="eyebrow">LLM-WIKI</p>
      <h1>연결 정보</h1>
      <p class="intro">현재 계정에 등록된 OpenAI와 S3/R2 연결 상태입니다. Secret 원문은 조회 화면에 표시하지 않습니다.</p>
    </header>
    <section class="card">
      <div class="section-heading"><div><span>01</span><h2>사용자 인증</h2></div><span id="auth-state" class="badge good">로그인됨</span></div>
      <p class="hint">인증 포털의 지식베이스 계정으로 연결되어 있습니다.</p>
      <button id="logout-button" class="secondary" type="button">로그아웃</button>
    </section>
    <section class="card">
      <div class="section-heading"><div><span>02</span><h2>연결 상태</h2></div><a class="button-link primary compact" href="/settings/edit">등록·수정</a></div>
      <div id="message" class="message" role="status" aria-live="polite"></div>
      <div class="details-list"><div><span>OpenAI API Key</span><strong id="openai-state">—</strong></div><div><span>저장소 유형</span><strong id="storage-type-value">—</strong></div><div><span>Endpoint URL</span><strong id="endpoint-value">—</strong></div><div><span>Bucket Name</span><strong id="bucket-value">—</strong></div><div><span>Access Key ID</span><strong id="access-key-state">—</strong></div><div><span>Secret Access Key</span><strong id="secret-key-state">—</strong></div><div><span>최종 수정</span><strong id="updated-at">—</strong></div></div>
    </section>
  </main>
  <script src="/settings/assets/settings.js" defer></script>
</body>
</html>
