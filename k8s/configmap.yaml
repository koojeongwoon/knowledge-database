apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: llm-wiki
data:
  POSTGRES_DB: knowledge_db
  POSTGRES_USER: postgres
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-config
  namespace: llm-wiki
data:
  DB_TYPE: "postgres"
  DB_HOST: "postgres-service.infra.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "knowledge_db"
  DB_USER: "knowledge_user"
  REDIS_CACHE_HOST: "redis-cache-service.infra.svc.cluster.local"
  REDIS_CACHE_PORT: "6379"
  REDIS_WIKI_HOST: "redis-wiki-cache-service.infra.svc.cluster.local"
  REDIS_WIKI_PORT: "6379"
  REDIS_STREAM_HOST: "redis-stream-service.infra.svc.cluster.local"
  REDIS_STREAM_PORT: "6379"
  EMBEDDING_PROVIDER: "openai"
  EMBEDDING_DIM: "1536"
  AUTH_SERVER_URL: "https://auth.snappytory.com"
  AUTH_TOKEN_ISSUER: "https://auth.snappytory.com"
  MCP_PUBLIC_HOST: "mcp.lynply.com"
  SETTINGS_PUBLIC_HOST: "knowledge.lynply.com"
  KNOWLEDGE_CLIENT_ID: "knowledge-service"
  KNOWLEDGE_TENANT_ID: "knowledge"
  KNOWLEDGE_REDIRECT_URI: "https://knowledge.lynply.com/callback"
  AUTHORIZATION_ENDPOINT: "https://auth.snappytory.com/oauth2/authorize"
  TOKEN_ENDPOINT: "https://auth.snappytory.com/oauth2/token"
  KNOWLEDGE_OAUTH_SCOPE: "openid profile email"
  KNOWLEDGE_SESSION_TTL_SECONDS: "2592000"
  ACCESS_TOKEN_REFRESH_SKEW_SECONDS: "120"
  RERANKER_ENABLED: "false"
  RERANKER_MODEL: "BAAI/bge-reranker-v2-m3"
  LEXICAL_RANK_THRESHOLD: "0.02"
  CONFIDENCE_FILTER_ENABLED: "true"
  CONFIDENCE_WEAK_VECTOR: "0.38"
  CONFIDENCE_WEAK_LEXICAL: "0.015"
  CONFIDENCE_SPARSE_MARGIN: "0.5"
  GRAPH_CONTEXT_ENABLED: "true"
  GRAPH_SEED_VECTOR_THRESHOLD: "0.5"
  GRAPH_SEED_LEXICAL_THRESHOLD: "0.05"
  GRAPH_CONTEXT_LIMIT: "2"
  DOCUMENT_EXPANSION_ENABLED: "true"
